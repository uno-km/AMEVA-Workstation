<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AMEVA Nexus - Enterprise Markdown Editor and Realtime Collaboration Viewer" />
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        alert("🚨 [AMEVA Runtime Error]\n\n" + message + "\n\nFile: " + source + "\nLine: " + lineno + ":" + colno + "\n\nStack:\n" + (error ? error.stack : 'N/A'));
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        alert("🚨 [AMEVA Unhandled Rejection]\n\nReason: " + event.reason + "\n\nStack:\n" + (event.reason ? event.reason.stack : 'N/A'));
      });
    </script>
    <title>AMEVA Markdown Editor &amp; Viewer</title>
  </head>
  <body style="background-color: #0a0a0f; color: #f3f4f6;">
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
