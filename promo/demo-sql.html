<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQL Database Demo | AMEVA Workstation</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <header>
    <a href="index.html" class="brand">
      <div class="brand-icon"><i class="fas fa-cubes"></i></div>
      <span>AMEVA Workstation</span>
    </a>
    <nav class="nav-menu">
      <a href="index.html" class="nav-link">Home</a>
      <a href="features.html" class="nav-link">Features</a>
      <a href="solutions-enterprise.html" class="nav-link">Solutions</a>
      <a href="pricing.html" class="nav-link">Pricing</a>
      <a href="contact.html" class="nav-link">Contact</a>
    </nav>
    <div class="header-actions">
      <button id="theme-toggle" class="btn-theme"><i class="fas fa-sun"></i></button>
      <a href="contact.html" class="btn-primary" style="padding: 8px 16px; font-size: 11px;">Request Demo</a>
    </div>
  </header>

  <main class="promo-container">
    <section style="margin-bottom: 30px;">
      <div class="badge-tag"><i class="fas fa-database"></i> SQLite WASM</div>
      <h2 style="font-size:28px; font-weight:800;">가상 SQLite WASM 데이터베이스</h2>
      <p style="color:var(--text-muted); font-size:14px; margin-top:6px;">
        사내 연구 자료나 개발 정보를 가상 SQLite DB로 관리해 보세요. SQL 쿼리를 실행하면 테이블 그리드로 자동 변환되어 표출됩니다.
      </p>
    </section>

    <!-- 시뮬레이터 본체 -->
    <div class="simulator-box">
      <!-- 좌측 입력 -->
      <div class="sim-input-panel">
        <div class="sim-label"><i class="fas fa-terminal"></i> SQL Query Input</div>
        <textarea id="sql-code-input" class="sim-textarea" style="color: #93c5fd;">-- 가상 SQLite DB에서 모든 개발진 정보 조회
SELECT * FROM developers;</textarea>
        <button id="run-sql-btn" class="run-btn" style="background:var(--accent);"><i class="fas fa-database"></i> Execute Query</button>
      </div>

      <!-- 우측 표 -->
      <div class="sim-output-panel">
        <div class="sim-label"><i class="fas fa-table"></i> Database Grid Result</div>
        <div id="sql-table-output" class="sim-console" style="background: #0f172a; padding: 20px;">
          여기에 쿼리 결과 표가 렌더링됩니다.
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { initTheme } from './js/common/theme.js';
    import { initNavigation } from './js/common/navigation.js';
    import { initDemoSQL } from './js/pages/demo-sql.js';

    initTheme();
    initNavigation();
    initDemoSQL();
  </script>
</body>
</html>
