<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' http://localhost:* https://*; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: http://localhost:* https://*; style-src 'self' 'unsafe-inline' http://localhost:* https://*; font-src 'self' data: http://localhost:* https://*; img-src 'self' data: blob: http://localhost:* https://*; connect-src 'self' ws://localhost:* wss://localhost:* ws://127.0.0.1:* http://127.0.0.1:* wss://demos.yjs.dev http://localhost:* https://*; worker-src blob:;" />
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        alert("🚨 [AMEVA Runtime Error]\n\n" + message + "\n\nFile: " + source + "\nLine: " + lineno + ":" + colno + "\n\nStack:\n" + (error ? error.stack : 'N/A'));
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        alert("🚨 [AMEVA Unhandled Rejection]\n\nReason: " + event.reason + "\n\nStack:\n" + (event.reason ? event.reason.stack : 'N/A'));
      });
    </script>
    <title>AMEVA Markdown Editor &amp; Viewer</title>
  </head>
  <body style="background-color: #0a0a0f; color: #f3f4f6;">
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
